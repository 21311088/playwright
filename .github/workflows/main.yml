name: Download Playwright Browsers (Linux)

on:
  workflow_dispatch:

jobs:
  download:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Playwright
        run: npm install playwright

      - name: Install Browsers (Linux)
        run: npx playwright install --force

      - name: Show browser path (debug)
        run: ls -R ~/.cache/ms-playwright || true

      - name: Zip browsers
        run: |
          zip -r browsers.zip ~/.cache/ms-playwright

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: playwright-browsers-linux
          path: browsers.zip
